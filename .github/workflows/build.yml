name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 消除 Node.js 警告
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git autoconf automake libtool pkg-config build-essential \
            libffi-dev libssl-dev zlib1g-dev libbz2-dev libreadline-dev \
            libsqlite3-dev libncurses5-dev libncursesw5-dev

      # 安装 Android SDK 和 NDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9477386
          build-tools-version: 34.0.0
          platforms-version: android-34
          ndk-version: 25.2.9519653   # NDK r25b

      # 验证 aidl 存在（不再尝试修改权限）
      - name: Verify aidl
        run: |
          echo "Checking aidl in $ANDROID_HOME/build-tools/34.0.0/"
          if [ -f "$ANDROID_HOME/build-tools/34.0.0/aidl" ]; then
            echo "✅ aidl found"
            # 尝试执行 aidl 以验证可执行（忽略退出码）
            "$ANDROID_HOME/build-tools/34.0.0/aidl" || echo "aidl execution test passed (expected non-zero exit)"
          else
            echo "❌ aidl not found"
            exit 1
          fi

      - name: Install buildozer
        run: pip install --user buildozer cython

      # 强制 buildozer 使用我们安装的 SDK/NDK
      - name: Build with buildozer
        run: |
          buildozer android debug \
            --sdk-path "$ANDROID_HOME" \
            --ndk-path "$ANDROID_HOME/ndk/25.2.9519653" \
            --android-api 34 \
            --android-minapi 21
        env:
          ANDROIDSDK: ${{ env.ANDROID_HOME }}
          ANDROIDNDK: ${{ env.ANDROID_HOME }}/ndk/25.2.9519653
          ANDROIDAPI: 34
          ANDROIDMINAPI: 21

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
