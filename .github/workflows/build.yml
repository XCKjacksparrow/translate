name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git autoconf automake libtool pkg-config build-essential \
            libffi-dev libssl-dev zlib1g-dev libbz2-dev libreadline-dev \
            libsqlite3-dev libncurses5-dev libncursesw5-dev

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9477386
          build-tools-version: 34.0.0
          platforms-version: android-34
          ndk-version: 25.2.9519653

      # 修复 sdkmanager 在 Java 11 下的 JAXB 缺失问题
      - name: Fix sdkmanager for Java 11
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          if [ -f "$SDKMANAGER" ]; then
            echo "Patching $SDKMANAGER to add JAXB module"
            sed -i 's/^\(\s*\)exec "\$\{JAVA_EXE\}" /&--add-modules java.xml.bind /' "$SDKMANAGER"
          else
            echo "sdkmanager not found at $SDKMANAGER"
            exit 1
          fi

      - name: Link Android SDK to buildozer expected path
        run: |
          mkdir -p /home/runner/.buildozer/android/platform
          ln -sfn "$ANDROID_HOME" /home/runner/.buildozer/android/platform/android-sdk

      - name: Install buildozer
        run: pip install --user buildozer cython

      - name: Build with buildozer
        run: |
          export ANDROIDSDK="$ANDROID_HOME"
          export ANDROIDNDK="$ANDROID_HOME/ndk/25.2.9519653"
          export ANDROIDAPI=34
          export ANDROIDMINAPI=21
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
