name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 消除 Node.js 警告
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git autoconf automake libtool pkg-config build-essential \
            libffi-dev libssl-dev zlib1g-dev libbz2-dev libreadline-dev \
            libsqlite3-dev libncurses5-dev libncursesw5-dev

      # 安装 Android SDK 和 NDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9477386
          build-tools-version: 34.0.0
          platforms-version: android-34
          ndk-version: 25.2.9519653   # NDK r25b

      # 验证 aidl 存在
      - name: Verify aidl
        run: |
          echo "Checking aidl in $ANDROID_HOME/build-tools/34.0.0/"
          if [ -f "$ANDROID_HOME/build-tools/34.0.0/aidl" ]; then
            echo "✅ aidl found"
          else
            echo "❌ aidl not found"
            exit 1
          fi

      # 创建 buildozer 期望的目录结构，并将 aidl 软链接过去
      - name: Link aidl to buildozer expected path
        run: |
          mkdir -p /home/runner/.buildozer/android/platform/android-sdk/build-tools
          ln -s "$ANDROID_HOME/build-tools/34.0.0" /home/runner/.buildozer/android/platform/android-sdk/build-tools/34.0.0

      - name: Install buildozer
        run: pip install --user buildozer cython

      # 设置环境变量，确保 buildozer 使用正确的 SDK/NDK
      - name: Build with buildozer
        run: |
          export ANDROIDSDK="$ANDROID_HOME"
          export ANDROIDNDK="$ANDROID_HOME/ndk/25.2.9519653"
          export ANDROIDAPI=34
          export ANDROIDMINAPI=21
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
