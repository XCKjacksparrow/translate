name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 可选，消除 Node.js 警告
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git autoconf automake libtool pkg-config build-essential \
            libffi-dev libssl-dev zlib1g-dev libbz2-dev libreadline-dev \
            libsqlite3-dev libncurses5-dev libncursesw5-dev

      # 安装 Android SDK 和 NDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9477386
          build-tools-version: 34.0.0
          platforms-version: android-34
          ndk-version: 25.2.9519653   # NDK r25b 对应的版本号

      # 为 buildozer 设置环境变量，指定 SDK 和 NDK 路径
      - name: Set buildozer environment
        run: |
          echo "ANDROIDSDK=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROIDNDK=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "ANDROIDAPI=34" >> $GITHUB_ENV          # 与 platforms-version 一致
          echo "ANDROIDMINAPI=21" >> $GITHUB_ENV       # 可根据你的需求调整

      - name: Install buildozer
        run: pip install --user buildozer cython

      - name: Build with buildozer
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: bin/*.apk
